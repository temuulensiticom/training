version: '3.8'

services:
  db1:
    image: mysql:latest
    container_name: mysql_db1
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db1
    ports:
      - "3308:3306"
    volumes:
      - db1_data:/var/lib/mysql
    networks:
      - mysql-network

  db2:
    image: mysql:latest
    container_name: mysql_db2
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db2
    ports:
      - "3309:3306"
    volumes:
      - db2_data:/var/lib/mysql
    networks:
      - mysql-network

volumes:
  db1_data:
  db2_data:

networks:
  mysql-network:
    driver: bridge
